networks:
  brewnet:
    external: true

services:
  backend:
    networks:
      - default
      - brewnet
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=brewnet"
      - "traefik.http.routers.bp-nodejs-express.rule=PathPrefix(`/apps/nodejs-express`)"
      - "traefik.http.routers.bp-nodejs-express.entrypoints=web"
      - "traefik.http.middlewares.bp-nodejs-express-strip.stripprefix.prefixes=/apps/nodejs-express"
      - "traefik.http.routers.bp-nodejs-express.middlewares=bp-nodejs-express-strip"
      - "traefik.http.services.bp-nodejs-express.loadbalancer.server.port=8080"

  postgres:
    profiles:
      - disabled

  mysql:
    profiles:
      - disabled

  frontend:
    networks:
      - default
      - brewnet
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=brewnet"
      - "traefik.http.routers.bp-nodejs-express-ui.rule=PathPrefix(`/apps/nodejs-express-ui`)"
      - "traefik.http.routers.bp-nodejs-express-ui.entrypoints=web"
      - "traefik.http.middlewares.bp-nodejs-express-ui-slash.redirectregex.regex=/apps/nodejs-express-ui$$"
      - "traefik.http.middlewares.bp-nodejs-express-ui-slash.redirectregex.replacement=/apps/nodejs-express-ui/"
      - "traefik.http.middlewares.bp-nodejs-express-ui-strip.stripprefix.prefixes=/apps/nodejs-express-ui"
      - "traefik.http.routers.bp-nodejs-express-ui.middlewares=bp-nodejs-express-ui-slash,bp-nodejs-express-ui-strip"
      - "traefik.http.services.bp-nodejs-express-ui.loadbalancer.server.port=80"
