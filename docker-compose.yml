services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - DB_DRIVER=${DB_DRIVER:-postgres}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-brewnet_db}
      - DB_USER=${DB_USER:-brewnet}
      - DB_PASSWORD=${DB_PASSWORD}
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-brewnet_db}
      - MYSQL_USER=${MYSQL_USER:-brewnet}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SQLITE_PATH=${SQLITE_PATH:-/app/data/brewnet_db.db}
    volumes:
      - sqlite-data:/app/data
    networks:
      - brewnet
      - brewnet-internal
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mysql:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "wget",  "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    labels:
      - "com.brewnet.stack=go-gin"
      - "com.brewnet.role=backend"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - brewnet
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    labels:
      - "com.brewnet.stack=go-gin"
      - "com.brewnet.role=frontend"

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${DB_NAME:-brewnet_db}
      POSTGRES_USER: ${DB_USER:-brewnet}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - brewnet-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-brewnet}"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.4
    profiles: ["mysql"]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-brewnet_db}
      MYSQL_USER: ${MYSQL_USER:-brewnet}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - brewnet-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  brewnet:
    driver: bridge
  brewnet-internal:
    driver: bridge
    internal: true

volumes:
  pg-data:
  mysql-data:
  sqlite-data:
